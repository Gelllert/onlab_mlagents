behaviors:
  PaperPlane:
    trainer_type: ppo
    hyperparameters:
      batch_size: 6144
      buffer_size: 163840    
      learning_rate: 0.0005  #000.5? esetleg
      beta: 0.01            
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 5
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.995        
        strength: 1.0
      curiosity:
        strength: 0.01
        gamma: 0.99
        learning_rate: 0.0003
    max_steps: 40000000
    time_horizon: 512   
    summary_freq: 50000